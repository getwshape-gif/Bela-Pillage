name: Compiler le plugin

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Recuperer SaberFactions.jar (necessaire pour compiler contre son API publique)
        run: |
          mkdir -p libs
          curl -fsSL -o SaberFactions.zip https://raw.githubusercontent.com/getwshape-gif/Bela-faction/main/SaberFactions.zip
          unzip -o -j SaberFactions.zip "SaberFactions.jar" -d libs
          test -f libs/SaberFactions.jar

      - name: Compiler avec Maven
        run: mvn -B package

      - name: Mettre le jar en telechargement
        uses: actions/upload-artifact@v4
        with:
          name: Bela-Pillage-jar
          path: target/*.jar
          if-no-files-found: error
